<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybierz maszynę - System Drukarni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3>Wybierz maszynę dla Drukarza: {{ user.username }}</h3>
            <form method="post" action="/select-machine" class="row g-3 mt-3">
                <div class="col-md-6">
                    <select name="machine" class="form-select" required>
                        <option value="">-- Wybierz maszynę --</option>
                        <option value="D6">D6</option>
                        <option value="D8">D8</option>
                        <option value="D10">D10</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Przypisz maszynę</button>
                    <a href="/logout" class="btn btn-outline-danger ms-2">Wyloguj</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
