<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - System Ewidencji Drukarni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/app-modern.css">
    <style>
        body {
            background: linear-gradient(125deg, #042a4f 0%, #0e4bab 48%, #16c8b8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #f5f9ff;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.14), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(0,0,0,0.2), transparent 45%);
            pointer-events: none;
        }
        .login-container {
            position: relative;
            backdrop-filter: blur(12px);
            background: rgba(16, 28, 62, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
            padding: 36px 32px;
            max-width: 520px;
            width: 100%;
            z-index: 1;
            animation: popIn 0.7s ease;
        }
        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .login-header h1 {
            color: #e2f0ff;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 4px;
            margin-bottom: 6px;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
        }
        .login-header p {
            color: #cce2ff;
            font-size: 0.95rem;
        }
        .login-logo {
            width: 320px;
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.4));
            transition: transform 0.4s ease;
        }
        .login-logo:hover {
            transform: scale(1.03);
        }
        @keyframes popIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .login-section {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin: 20px 0;
        }
        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
        }
        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }
        .separator span {
            padding: 0 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <img src="{{ logo_url if logo_url else '/static/logo_duze.svg' }}" alt="Logo" class="mb-3 login-logo" style="width: 280px; max-width: 90%; height: auto;" onerror="this.src='/static/logo_duze.svg'; this.style.width='280px';">
        <h1>System Drukarni</h1>
        <p>System Ewidencji i Zarządzania Produkcją</p>
    </div>

    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <div class="login-section">
        <h5 class="mb-3"><i class="fas fa-lock"></i> Logowanie</h5>
        <form method="post" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Nazwa użytkownika:</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="np. drukarz1" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Hasło:</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt"></i> Zaloguj się
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
