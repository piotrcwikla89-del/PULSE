<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybierz przewijarkę - System Drukarni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-wind"></i> Wybór przewijarki</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted">Zalogowano jako: <strong>{{ user.username }}</strong></p>
                    <form method="post" action="/select-przewijarka" class="row g-3 mt-1">
                        <div class="col-12">
                            <label class="form-label fw-bold">Wybierz przewijarkę:</label>
                            <select name="machine" class="form-select form-select-lg" required>
                                <option value="">-- Wybierz --</option>
                                <option value="P1">P1</option>
                                <option value="P2">P2</option>
                            </select>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                                <i class="fas fa-check"></i> Przejdź do planów
                            </button>
                            <a href="/logout" class="btn btn-outline-danger btn-lg">
                                <i class="fas fa-sign-out-alt"></i> Wyloguj
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
